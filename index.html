<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Preços Colmeia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Reset e Fonte Moderna */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c3e50; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .btn-exportar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 16px;
            background-color: #ff9800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 2000;
        }
        .btn-exportar:hover { background-color: #e68a00; transform: scale(1.05); }
        .btn-exportar:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }

        #conteudo-pdf {
            width: 100%;
            max-width: 1000px; 
            background: linear-gradient(rgba(255, 255, 255, 0.40), rgba(255, 255, 255, 0.40)), 
                        url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?q=80&w=1200&auto=format&fit=crop') center/cover;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            padding-bottom: 20px;
        }

        .banner-topo {
            width: 100%;
            height: 180px; 
            object-fit: cover; 
            border-bottom: 4px solid #ff9800;
            display: block;
        }

        /* --- ESTILO DO CABEÇALHO --- */
        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.98); 
            padding: 20px 30px; 
            display: flex; 
            align-items: center;
            justify-content: space-between; 
            flex-wrap: wrap; 
            gap: 15px;
            border-bottom: 3px solid #eeeeee;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .titulo-container {
            display: flex;
            align-items: center;
            /* ALTERADO: Aumentei o gap de 18px para 35px para dar mais espaço */
            gap: 35px; 
        }

        .logo-empresa {
            height: 55px; 
            width: auto;
            border-radius: 8px; 
        }

        header h1 {
            color: #2c3e50;
            font-size: 26px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.5px; 
        }

        header h1 .destaque {
            background: linear-gradient(90deg, #ff9800, #e65c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p#data-atual { 
            background-color: #f4f6f8;
            color: #5c6a79;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #e1e4e8;
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px; 
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        /* --- ESTILOS DA TABELA --- */
        .tabela-container {
            max-height: 55vh;
            overflow-y: auto;
            padding: 0 20px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.90); 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
        }
        
        td:nth-child(2) {
            text-align: left;
            color: #2c3e50;
        }

        tbody tr:hover { background-color: #fcfcfc; }
        
        tbody tr {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .linha-oferta { background-color: #fff8e1 !important; }
        .linha-oferta td { font-weight: bold; color: #d84315; }
        
        .badge-oferta {
            display: inline-block;
            white-space: nowrap;
            background-color: #ff3d00;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tabela-container::-webkit-scrollbar { width: 8px; }
        .tabela-container::-webkit-scrollbar-track { background: rgba(241, 241, 241, 0.8); border-radius: 8px; }
        .tabela-container::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 8px; }
    </style>
</head>
<body>

    <button class="btn-exportar" id="btn-pdf" onclick="gerarPDF()">📄 Exportar PDF Completo</button>

    <div id="conteudo-pdf">
        
        <img src="https://i.postimg.cc/HsK5Cgyz/Sem-titulo-1.png" alt="Banner Topo" class="banner-topo">

        <header>
            <div class="titulo-container">
                <img src="https://i.postimg.cc/dJ8hpY81/logo.png" alt="Logo" class="logo-empresa">
                
                <h1>Tabela de Preços <span class="destaque">Colmeia</span></h1>
            </div>
            <p id="data-atual">Atualizando data...</p>
        </header>

        <div class="tabela-container" id="area-rolagem">
