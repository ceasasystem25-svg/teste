<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Preços Colmeia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Reset e Fonte Moderna */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* ALTERADO: Fundo do site mais escuro para destacar o documento */
            background-color: #2c3e50; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .btn-exportar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 16px;
            background-color: #ff9800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 2000;
        }
        .btn-exportar:hover { background-color: #e68a00; transform: scale(1.05); }
        .btn-exportar:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }

        #conteudo-pdf {
            width: 100%;
            max-width: 1000px; 
            /* ALTERADO: Reduzido o branco de 0.90 para 0.40 para a imagem ficar bem visível */
            background: linear-gradient(rgba(255, 255, 255, 0.40), rgba(255, 255, 255, 0.40)), 
                        url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?q=80&w=1200&auto=format&fit=crop') center/cover;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            padding-bottom: 20px;
        }

        /* --- ESTILOS DO NOVO TOPO --- */
        .banner-topo {
            width: 100%;
            height: 180px; /* Altura do banner */
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
            border-bottom: 4px solid #ff9800;
            display: block;
        }

        header {
            position: sticky;
            top: 0;
            /* ALTERADO: Adicionado leve transparência para combinar com o fundo */
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #eeeeee;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Container que alinha a logo e o título lado a lado */
        .titulo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px; /* Espaço entre a logo e o texto */
            margin-bottom: 8px;
        }

        .logo-empresa {
            height: 60px; /* Altura da logo */
            width: auto;
            border-radius: 8px; /* Cantos levemente arredondados na logo */
        }

        header h1 {
            color: #333;
            font-size: 26px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Data com tamanho aumentado */
        header p#data-atual { 
            color: #d32f2f; /* Vermelho escuro para destacar */
            font-size: 18px; /* Tamanho maior */
            font-weight: bold; /* Negrito */
            font-style: italic; 
        }

        /* --- ESTILOS DA TABELA --- */
        .tabela-container {
            max-height: 55vh;
            overflow-y: auto;
            padding: 0 20px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            /* ALTERADO: Fundo branco semi-sólido para a tabela não ficar ilegível por causa da imagem */
            background: rgba(255, 255, 255, 0.90); 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
        }
        
        td:nth-child(2) {
            text-align: left;
            color: #2c3e50;
        }

        tbody tr:hover { background-color: #fcfcfc; }
        
        /* CORREÇÃO 1: Evita que a linha seja cortada ao meio na quebra de página do PDF */
        tbody tr {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .linha-oferta { background-color: #fff8e1 !important; }
        .linha-oferta td { font-weight: bold; color: #d84315; }
        
        /* CORREÇÃO 2: Força o selo a não amassar o texto */
        .badge-oferta {
            display: inline-block;
            white-space: nowrap;
            background-color: #ff3d00;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tabela-container::-webkit-scrollbar { width: 8px; }
        .tabela-container::-webkit-scrollbar-track { background: rgba(241, 241, 241, 0.8); border-radius: 8px; }
        .tabela-container::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 8px; }
    </style>
</head>
<body>

    <button class="btn-exportar" id="btn-pdf" onclick="gerarPDF()">📄 Exportar PDF Completo</button>

    <div id="conteudo-pdf">
        
        <img src="https://i.postimg.cc/HsK5Cgyz/Sem-titulo-1.png" alt="Banner Topo" class="banner-topo">

        <header>
            <div class="titulo-container">
                <img src="https://i.postimg.cc/dJ8hpY81/logo.png" alt="Logo" class="logo-empresa">
                
                <h1>Tabela de Preços Colmeia</h1>
            </div>
            <p id="data-atual">Atualizando data...</p>
        </header>

        <div class="tabela-container" id="area-rolagem">
            <table id="tabela-precos">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Produto</th>
                        <th>Peso/Qtd</th>
                        <th>CX/UND</th>
                        <th>Preço/Emb.</th>
                        <th>Preço Kg/Und</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" style="padding: 30px;">Conectando ao banco de dados...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwmzjYDJHOqdfzo1sxpsd3rppfptEHcsH997Tc2Ck-P6CQ2-KxOW3VFDDzfFOsI5KsL/exec';

        const dataHoje = new Date().toLocaleDateString('pt-BR');
        document.getElementById('data-atual').innerText = `Atualizado em: ${dataHoje}`;

        async function carregarDados() {
            try {
                const resposta = await fetch(API_URL);
                if (!resposta.ok) throw new Error('Falha na comunicação com o servidor.');
                
                const json = await resposta.json();
                if(json.status === "sucesso") {
                    montarTabela(json.dados);
                } else {
                    throw new Error('Erro ao processar os dados da planilha.');
                }
            } catch (erro) {
                mostrarErro(erro);
            }
        }

        function montarTabela(dados) {
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = ''; 

            if (dados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">A planilha está vazia.</td></tr>';
                return;
            }

            dados.forEach(linha => {
                if (!linha[1] || linha[1].trim() === "") return; 

                const situacao = linha[7] ? linha[7].toString().toUpperCase().trim() : "";
                if (situacao === "NÃO" || situacao === "NAO" || situacao.includes("INDISPON")) return; 

                const oferta = linha[6] ? linha[6].toString().toUpperCase().trim() : "";
                const isOferta = (oferta === "SIM" || oferta === "S");

                const tr = document.createElement('tr');
                if (isOferta) tr.classList.add('linha-oferta');

                for(let i = 0; i < 6; i++) {
                    const td = document.createElement('td');
                    if (i === 1 && isOferta) {
                        td.innerHTML = `${linha[i]} <span class="badge-oferta">🔥 Oferta</span>`;
                    } else {
                        td.textContent = linha[i] || '-'; 
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        function mostrarErro(erro) {
            document.querySelector('tbody').innerHTML = `<tr><td colspan="6" style="color:red;">Erro ao carregar: ${erro.message}</td></tr>`;
        }

        function gerarPDF() {
            const elemento = document.getElementById('conteudo-pdf');
            const areaRolagem = document.getElementById('area-rolagem');
            const btn = document.getElementById('btn-pdf');

            btn.innerText = "⏳ Gerando PDF...";
            btn.disabled = true;

            areaRolagem.style.maxHeight = 'none';
            areaRolagem.style.overflowY = 'visible';

            // CORREÇÃO 3: Margens laterais adicionadas e o comando de pagebreak ativado!
            const opcoes = {
                margin:       [10, 5, 10, 5], 
                filename:     `Tabela_Colmeia_${dataHoje.replace(/\//g, '-')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'] }
            };

            html2pdf().set(opcoes).from(elemento).save().then(() => {
                areaRolagem.style.maxHeight = '55vh';
                areaRolagem.style.overflowY = 'auto';
                btn.innerText = "📄 Exportar PDF Completo";
                btn.disabled = false;
            });
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
